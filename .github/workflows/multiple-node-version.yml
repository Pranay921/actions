name multi-version
on:
  push:

jobs:
  multi-node:  
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [16,18,20]

    steps:
      - name: checkout repo
        uses: actions/checkout@v4


      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Display Node Version
        run: node --version